# Example bot registration config for cells (#24).
#
# Run head-to-head:
#     python cells.py --bots bots.example.toml alice bob
#
# Run round-robin tournament across every bot in this file:
#     python tournament.py --bots bots.example.toml
#
# Run a tournament across a subset:
#     python tournament.py --bots bots.example.toml alice bob carol

# In-process mind: imported directly into the engine. Lowest latency,
# no network roundtrip. `module` is a Python import path.
[bots.alice]
transport = "in_process"
module = "minds.mind1"

# HTTP mind: cells POSTs the per-tick world view (or the per-team
# batch payload, see #23) to `url`. Optional `headers` for auth,
# optional `timeout` (seconds, default 5.0). Optional `verify`
# (default true) — set false only for self-signed test servers.
# Optional `max_response_bytes` (default 1048576 = 1 MB) caps the
# response size; oversized payloads are dropped + struck via #25.
#
# HMAC mutual auth (#44): set `hmac_secret` to a shared secret (e.g. a
# base64-encoded 32-byte random value). The engine adds
# X-Cells-Timestamp and X-Cells-Signature headers to every request and
# verifies that the bot's response carries matching headers. Requests
# from the bot side can verify the engine's signature the same way:
#
#   import hashlib, hmac, time
#   def verify(secret, ts, body_bytes, sig):
#       msg = ts.encode() + b"." + body_bytes
#       expected = hmac.new(secret.encode(), msg, hashlib.sha256).hexdigest()
#       return hmac.compare_digest(expected, sig)
#
#   def sign(secret, body_bytes):
#       ts = str(int(time.time()))
#       sig = hmac.new(secret.encode(), ts.encode() + b"." + body_bytes, hashlib.sha256).hexdigest()
#       return ts, sig
[bots.bob]
transport = "http"
url = "https://bob.example.com/cells/act"
hmac_secret = "REPLACE_WITH_32B_BASE64"   # shared secret with the bot operator
hmac_algorithm = "sha256"                  # default
hmac_skew_seconds = 30                     # reject responses older than this
timeout = 5.0
verify = true
max_response_bytes = 1048576

# MCP mind via stdio: cells spawns the contestant's server as a
# subprocess and calls the `act` (or `act_batch`) tool over stdio.
[bots.carol]
transport = "mcp"
mode = "stdio"
command = ["python", "bots/carol_server.py"]

# MCP mind via SSE: cells connects to a hosted MCP endpoint.
[bots.dave]
transport = "mcp"
mode = "sse"
url = "https://dave.example.com/mcp"

# Tournament-level knobs. All keys optional; defaults shown.
[tournament]
bounds = 300
symmetric = true
rounds = 4
max_time = 5000
